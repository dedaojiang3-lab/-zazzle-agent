name: "Zazzle Agent - Daily Designs"

on:
  schedule:
    - cron: '37 16 * * *'  # 北京时间 00:37
  workflow_dispatch:

permissions:
  contents: write  # 允许 git push

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: 写入 Secrets 配置
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: |
          cp config.example.json config.json
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('config.json', 'utf-8'));
            cfg.deepseek.apiKey = process.env.DEEPSEEK_KEY;
            fs.writeFileSync('config.json', JSON.stringify(cfg, null, 2));
          "

      - name: 运行生成流水线（不上传）
        run: node src/index.js --no-upload

      - name: 上传产出物到 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zazzle-designs-${{ github.run_id }}
          path: output/

      - name: 提交生成的图片到仓库
        run: |
          git config user.name "Zazzle Bot"
          git config user.email "bot@zazzle.local"
          git add -f output/
          git diff --staged --quiet || git commit -m "designs: $(date +%Y-%m-%d)"
          git push
